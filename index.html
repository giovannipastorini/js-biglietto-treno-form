<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- link css -->
     <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body class="red">
    <h1>Calcola il prezzo del tuo biglietto</h1>
    <form>
        <div>
            <label for="username-field">Inserisici il tuo nome:</label>
            <input type="text" required id="username-field">
        </div>
        <div>
            <label for="km-field">Chilometri da percorrere:</label>
            <input type="number" required id="km-field">
        </div>
        <div>
            <label for="age-field">Età passeggero:</label>
            <input type="number" required id="age-field">
        </div>
        <div>
           <button type="submit" id="submit-field">Invia</button> 
            <!-- pulsante reset -->
           <button type="reset">Reset</button> 
        </div>      
    </form>
    
    <!-- sezione dettagli biglietto -->
    <section id="ticket-details" class="d-none">
        <h2>DETTAGLI BIGLIETTO</h2>
        <ul>
            <li><strong>Nome passeggero: </strong><span id="person-name-detail"></span></li>
            <li><strong>Età: </strong><span id="age-detail"></span></li>
            <li><strong>Chilometri: </strong><span id="km-detail"></span></li>
            <li><strong>Prezzo biglietto: <span id="price-detail"></span></strong></li>
        </ul>
    </section>

    <!-- link javascript -->
    <script src="./main.js"></script>
</body>
</html>
